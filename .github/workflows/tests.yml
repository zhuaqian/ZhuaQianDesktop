name: Build and Test

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify Roslyn compiler (not legacy C# 5)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          . (Join-Path $env:GITHUB_WORKSPACE 'src\scripts\resolve-compiler.ps1')
          $c = Resolve-CSharpCompiler
          if (-not $c) { throw "No C# compiler found on the CI runner." }
          if (-not $c.Roslyn) {
            throw "FATAL: only the legacy .NET Framework compiler (C# 5) was found. This project requires Roslyn (C# 7.3). The CI runner image may have changed — ensure Visual Studio Build Tools are installed."
          }
          Write-Host "Roslyn compiler verified: $($c.Path)"
      - name: Build and run unit tests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $p = Join-Path $env:GITHUB_WORKSPACE 'src\scripts\run-tests.ps1'
          & pwsh -ExecutionPolicy Bypass -File $p
          if ($LASTEXITCODE -ne 0) { throw "Tests failed" }

  # Official release artifacts are produced by CI only. Local builds must stay
  # named *-local-dev* and are never published as releases.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build executable (dist/ZhuaQianDesktop.exe)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          & pwsh -ExecutionPolicy Bypass -File (Join-Path $env:GITHUB_WORKSPACE 'src\build.ps1')
          if ($LASTEXITCODE -ne 0) { throw "Build failed" }
      - name: Package release artifact
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = $env:GITHUB_REF_NAME
          $dist = Join-Path $env:GITHUB_WORKSPACE 'dist'
          $zip = Join-Path $env:GITHUB_WORKSPACE "ZhuaQianDesktop-$tag.zip"
          Compress-Archive -Path (Join-Path $dist '*') -DestinationPath $zip -Force
          Write-Host "Created $zip"
      - name: Upload release artifact
        uses: actions/upload-artifact@v5
        with:
          name: ZhuaQianDesktop-${{ github.ref_name }}
          path: ZhuaQianDesktop-${{ github.ref_name }}.zip
